<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hustle Ink - Tattoo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                teal: '#00f2ff',
                purple: '#bc13fe',
                navy: '#0a0c10',
                dark: '#05070a'
              }
            },
            fontFamily: {
              sans: ['Space Grotesk', 'Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif']
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;600;800&display=swap');
      
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #05070a;
        color: #f4f4f5;
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .glass-border {
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .mesh-gradient {
        position: absolute;
        width: 140%;
        height: 140%;
        top: -20%;
        left: -20%;
        background-color: #05070a;
        background-image: 
          radial-gradient(at 20% 20%, hsla(180,100%,50%,0.12) 0, transparent 40%), 
          radial-gradient(at 80% 20%, hsla(280,100%,50%,0.12) 0, transparent 40%), 
          radial-gradient(at 50% 50%, hsla(180,100%,50%,0.08) 0, transparent 60%), 
          radial-gradient(at 20% 80%, hsla(280,100%,50%,0.12) 0, transparent 40%), 
          radial-gradient(at 80% 80%, hsla(180,100%,50%,0.12) 0, transparent 40%);
        filter: blur(100px);
        opacity: 0.7;
        z-index: 0;
      }

      @keyframes mesh-float {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(5%, 5%) scale(1.1); }
        66% { transform: translate(-5%, 2%) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }

      .mesh-animate {
        animation: mesh-float 20s ease-in-out infinite;
      }

      .glass-cta {
        background: rgba(0, 242, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 242, 255, 0.3);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.1), inset 0 0 12px rgba(255, 255, 255, 0.05);
      }

      .glass-cta:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(0, 242, 255, 0.5);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2);
      }

      .text-glow-blue {
        text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
      }

      .text-glow-purple {
        text-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #05070a; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1); 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00f2ff; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",

    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
